[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    --strict-markers
    --strict-config
    --tb=short
    -ra
    --color=yes
    --durations=10
    -m "not skip_ci and not endurance"
markers =
    unit: fast, isolated unit tests (<1s)
    integration: cross-module tests (1-30s)
    chaos: fault injection tests
    endurance: long-running tests (>5min) — skip by default
    regression: tests for known bugs
    security: security & secret leakage tests
    blocker: must pass before testnet
    requires_testnet: needs HL testnet connection
    requires_anthropic: needs Anthropic API key
    slow: skipped by default in fast runs
    skip_ci: skip in CI; manual / operational tests only
    major: 🟡 MAJOR severity — should pass, document if not
    minor: 🟢 MINOR severity — nice-to-have
    stress: V2 stress / load tests (dual-market) — run via -m stress
filterwarnings =
    error
    ignore::DeprecationWarning:hyperliquid.*
    ignore::DeprecationWarning:websockets.*
    ignore::DeprecationWarning:web3.*
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning