[pytest]
# Solvira pytest configuration

minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Default options
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --showlocals
    --color=yes
    -p no:cacheprovider

# Coverage (uncomment when ready)
# addopts = --cov=. --cov-report=term-missing --cov-report=html --cov-fail-under=75

# Test markers (registered to avoid warnings)
markers =
    unit: Tier 1 — fast, isolated module tests
    integration: Tier 2 — multi-module pipeline tests
    chaos: Tier 3 — fault injection, network/disk failures
    endurance: Tier 4 — long-running stability tests (slow)
    security: Tier 5 — secret leakage, permissions, static scan
    regression: Tier 6 — regression tests for the 22 known bugs
    blocker: 🔴 BLOCKER severity — must pass before mainnet
    major: 🟡 MAJOR severity — should pass, document if not
    minor: 🟢 MINOR severity — nice to have
    requires_testnet: Needs Hyperliquid testnet connection
    requires_anthropic: Needs ANTHROPIC_API_KEY
    requires_arbitrum: Needs Arbitrum RPC + funded wallet
    slow: Tests >30s runtime
    skip_ci: Skip in CI (manual only)

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeouts (kill hung tests)
timeout = 60
timeout_method = thread

# Filter warnings
filterwarnings =
    error
    ignore::DeprecationWarning:pandas.*
    ignore::DeprecationWarning:numpy.*
    ignore::PendingDeprecationWarning
